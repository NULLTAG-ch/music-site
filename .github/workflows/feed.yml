name: Refresh release feed

# Regenerates releases.json from Deezer + YouTube + SoundCloud + Spotify
# every 15 minutes (and on demand), commits it, then deploys Pages — in its
# OWN run. It deliberately does NOT trigger on push: deploy.yml owns
# push-to-main deploys, and two Pages workflows on the same push fight over
# the `pages` concurrency group ("Canceling since a higher priority waiting
# request for pages exists") which previously meant no deploy ever finished.
#
# Cadence note: GitHub schedules are best-effort and often delayed under load,
# so "*/15" is effectively ~15-30 min, not exact. True instant would need a
# webhook/poller (Cloudflare Worker) — see DJIS tools/telegram dropin notes.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build releases.json
        env:
          SC_CLIENT_ID: ${{ secrets.SC_CLIENT_ID }}
          SC_CLIENT_SECRET: ${{ secrets.SC_CLIENT_SECRET }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node tools/build-feed.mjs

      # Postet Release-Änderungen nach Telegram. Läuft hier — nach dem Build,
      # vor dem Commit —, weil dann HEAD = alte committete releases.json und der
      # Working-Tree = neu gebaute Version ist (sauberer Diff). continue-on-error,
      # damit ein Telegram-Ausfall niemals den Site-Deploy blockiert.
      - name: Notify Telegram of release changes
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 .github/scripts/notify_release.py

      # Committet releases.json UND announced.json (der Notify-Ledger, den der
      # vorige Step fortschreibt). Beide müssen persistiert werden, sonst würde
      # der nächste Lauf bereits angekündigte Releases erneut posten.
      - name: Commit feed if it changed
        run: |
          if git diff --quiet -- releases.json announced.json; then
            echo "No feed changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add releases.json announced.json
            git commit -m "chore: refresh release feed [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
