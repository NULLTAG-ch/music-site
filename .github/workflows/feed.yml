name: Refresh release feed

# Regenerates releases.json from Deezer's REST API every 6 hours (and on
# demand), commits it if it changed, then redeploys Pages. Runs on the
# default branch only — schedule/manual dispatch always target main, which
# is what the github-pages environment is locked to.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build releases.json
        run: node tools/build-feed.mjs

      - name: Commit feed if it changed
        run: |
          if git diff --quiet -- releases.json; then
            echo "No feed changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add releases.json
            git commit -m "chore: refresh release feed [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
