name: Deploy to GitHub Pages

# Pages must be enabled once: repo Settings → Pages → Source = "GitHub Actions".
# SOLE owner of push-to-main Pages deploys. Triggers on `main` only — a
# second ref (or feed.yml) in the shared `pages` concurrency group makes
# GitHub cancel runs ("higher priority waiting request for pages exists")
# so nothing ever publishes. feed.yml deploys on its own schedule instead.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Idempotent; ensures the Pages site exists (Actions source).
          enablement: true

      - name: Prune non-site files from artifact
        # Keep the repo as-is; just don't ship prototypes/tooling to Pages.
        run: rm -rf assets/proto tools docs

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
