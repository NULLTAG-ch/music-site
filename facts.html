<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NULLTAG · Lichtjahr Vol.2 · Physik-Video</title>
<meta name="description" content="Lichtjahr Vol.2 — echte Astrophysik als Musik. Das Physik-Video: 6 Tracks, 6 kosmische Phänomene." />
<link rel="icon" type="image/svg+xml" href="assets/avatar.svg" />
<meta property="og:title" content="NULLTAG · Lichtjahr Vol.2 — Physik-Video" />
<meta property="og:description" content="Echte Astrophysik als Musik. Zum Anschauen." />
<meta property="og:type" content="video.other" />
<meta property="og:image" content="https://music.nulltag.ch/assets/facts-poster.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; min-height: 100vh; background:
      radial-gradient(ellipse 50% 40% at 22% 24%, rgba(95,140,200,0.10), transparent 60%),
      radial-gradient(ellipse 44% 36% at 82% 78%, rgba(232,121,196,0.08), transparent 60%),
      radial-gradient(ellipse at 50% 45%, #0d0a14 0%, #0a0a0a 58%, #050505 100%);
    color: var(--bone); font-family: var(--font-mono); display: flex; flex-direction: column; }

  .fv-top { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; }
  .fv-top a { color: var(--bone); text-decoration: none; font-size: 13px; letter-spacing: 0.4em; font-weight: 500; display: inline-flex; align-items: center; gap: 10px; }
  .fv-top a .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--tiefrot); box-shadow: 0 0 8px var(--tiefrot); }
  .fv-top .rail { color: var(--muted); font-size: 11px; letter-spacing: 0.22em; }

  .fv-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 22px 22px; }
  .fv { position: relative; width: 100%; max-width: 1280px; aspect-ratio: 16 / 9; border: 1px solid var(--border); background: #000; box-shadow: var(--shadow-cover); overflow: hidden; }
  .fv video { width: 100%; height: 100%; display: block; object-fit: cover; background: #000; }

  .fv-foot { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; padding: 0 22px 26px; }
  .fv-cap { color: var(--muted); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .fv-cap b { color: var(--bone); font-weight: 500; }
  .fv-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .fv-btn { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--bone-dim); text-decoration: none; border: 1px solid var(--border-warm); background: rgba(10,10,10,0.6); padding: 10px 14px; transition: all 150ms var(--ease); }
  .fv-btn:hover { color: var(--bone); border-color: var(--tiefrot); background: var(--tiefrot-dim); }
  .fv-btn--primary { color: var(--void); background: var(--tiefrot); border-color: var(--tiefrot); font-weight: 700; }
  .fv-btn--primary:hover { background: var(--bone); border-color: var(--bone); color: var(--void); }
  .fv-unmute { position: absolute; top: 16px; right: 16px; z-index: 3; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--void); background: var(--tiefrot); border: 0; padding: 10px 14px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 18px rgba(255,42,85,0.45); transition: opacity .25s var(--ease); }
  .fv-unmute:hover { background: var(--bone); }
  .fv-unmute.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <header class="fv-top">
    <a href="index.html"><span class="dot" aria-hidden="true"></span>NULLTAG</a>
    <span class="rail">LICHTJAHR VOL.2 · PHYSIK-VIDEO</span>
  </header>

  <main class="fv-wrap">
    <div class="fv">
      <video id="fv-video" controls autoplay muted loop playsinline preload="metadata" poster="assets/facts-poster.jpg">
        <source src="assets/facts.mp4" type="video/mp4" />
        Dein Browser kann dieses Video nicht abspielen — <a href="facts-read.html" style="color:var(--tiefrot)">lies die Fakten</a>.
      </video>
      <button id="fv-unmute" class="fv-unmute" aria-label="Ton einschalten">♪ Ton an</button>
    </div>
  </main>

  <footer class="fv-foot">
    <div class="fv-cap">6 Tracks · 6 echte Phänomene · <b>Echte Astrophysik als Musik</b><br><span style="opacity:.6">Footage: NASA / SVS · ESA / Hubble · Public Domain</span></div>
    <div class="fv-links">
      <a class="fv-btn" href="facts-read.html">≡ Alle Fakten lesen</a>
      <a class="fv-btn fv-btn--primary" href="https://soundcloud.com/nulltag" target="_blank" rel="noopener">▶ Hör Lichtjahr Vol.2</a>
      <a class="fv-btn" href="index.html">← Zurück</a>
    </div>
  </footer>
  <script>
    (function () {
      var v = document.getElementById("fv-video"), b = document.getElementById("fv-unmute");
      if (!v || !b) return;
      function unmute() { v.muted = false; v.volume = 1; if (v.paused) v.play(); b.classList.add("hidden"); }
      b.addEventListener("click", unmute);
      v.addEventListener("volumechange", function () { if (!v.muted && v.volume > 0) b.classList.add("hidden"); });
    })();
  </script>
</body>
</html>
