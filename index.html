<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NULLTAG — Releases</title>
  <meta name="description" content="The NULLTAG release feed — every drop, auto-updated, with one link to every platform." />

  <link rel="canonical" href="https://music.nulltag.ch" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" />

  <!-- Open Graph / Twitter (replace og-image with a 1200x630 PNG for best results) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="NULLTAG — Listen everywhere" />
  <meta property="og:description" content="All NULLTAG music in one place — every platform, one link." />
  <meta property="og:url" content="https://music.nulltag.ch" />
  <meta property="og:image" content="https://music.nulltag.ch/assets/og-image.svg" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="container">

      <header class="profile">
        <img id="logo" class="logo" src="assets/logo.svg" alt="logo" width="88" height="88" />
        <h1 id="name" class="name"></h1>
        <p id="tagline" class="tagline"></p>
      </header>

      <section id="release" class="release" aria-label="Pinned release">
        <img class="release-art" src="assets/cover-placeholder.svg" alt="cover art" width="96" height="96" />
        <div class="release-body">
          <span class="release-eyebrow">Pinned release</span>
          <h2 class="release-title"></h2>
          <p class="release-subtitle"></p>
          <a class="release-cta" href="#">Listen everywhere</a>
        </div>
      </section>

    </div>

    <section id="releases-section" class="releases" aria-label="All releases" hidden>
      <h2 class="section-title">Releases</h2>
      <div id="releases-grid" class="releases-grid"></div>
      <p id="releases-status" class="releases-status" role="status">Loading the release feed…</p>
    </section>

    <div class="container">

      <section aria-label="Streaming platforms">
        <h2 class="section-title">Stream</h2>
        <ul id="streaming-list" class="link-list"></ul>
      </section>

      <section aria-label="Social media">
        <h2 class="section-title">Follow</h2>
        <ul id="social-list" class="social-list"></ul>
      </section>

      <footer class="footer">
        <span id="footer-name"></span> · <span id="year"></span> · Buchs SG, Switzerland
      </footer>

    </div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
