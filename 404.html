<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NULLTAG · 404</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="icon" type="image/svg+xml" href="/assets/avatar.svg" />
<script src="/config.js"></script>
<script>
  // GitHub Pages serves this file for every unknown path.
  // /s/<slug> is our short-link namespace → resolve via CONFIG.shortlinks
  // and redirect before anything paints. Everything else gets the 404 UI.
  (function(){
    var m = location.pathname.match(/^\/s\/([a-z0-9-]+)\/?$/i);
    if (!m) return;
    var links = (window.CONFIG && window.CONFIG.shortlinks) || {};
    var target = links[m[1].toLowerCase()] || "https://soundcloud.com/nulltag";
    location.replace(target);
  })();
</script>
<style>
  :root { --void:#0a0a0a; --bone:#e8e3da; --bone-dim:#a8a29a; --muted:#6b6660; --tiefrot:#ff2a55; --border:rgba(232,227,218,0.14); }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body { background: var(--void); color: var(--bone); font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; display: grid; place-items: center; padding: 24px; }
  .card { max-width: 560px; width: 100%; border: 1px solid var(--border); padding: 40px 36px; }
  .eye { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--tiefrot); margin-bottom: 18px; }
  h1 { font-size: 64px; line-height: 0.9; letter-spacing: -0.02em; margin-bottom: 14px; }
  p { font-size: 13px; line-height: 1.7; color: var(--bone-dim); margin-bottom: 28px; }
  code { color: var(--bone); }
  .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .links a { background: var(--void); color: var(--bone); padding: 14px 16px; text-decoration: none; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; display: flex; justify-content: space-between; }
  .links a:hover { color: var(--tiefrot); }
</style>
</head>
<body>
  <div class="card">
    <div class="eye">NULLTAG · SIGNAL LOST</div>
    <h1>404</h1>
    <p id="msg">Diese Seite existiert nicht — aber die Musik schon.</p>
    <div class="links">
      <a href="/"><span>Home</span><span>↗</span></a>
      <a href="/#catalog"><span>Catalog</span><span>↗</span></a>
      <a href="https://soundcloud.com/nulltag" rel="noopener"><span>SoundCloud</span><span>↗</span></a>
    </div>
  </div>
</body>
</html>
